<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rankings Map — компилятор рейтингов на карте</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <aside id="panel">
      <h1>Rankings&nbsp;Map</h1>
      <p class="tagline">Международные индексы на карте + свой индекс формулой</p>

      <label class="field">
        <span>Индекс</span>
        <select id="indexSelect"></select>
      </label>

      <label class="field">
        <span>Год: <b id="yearLabel">—</b></span>
        <input id="yearSlider" type="range" min="0" max="0" step="1" value="0" />
      </label>

      <details class="formula" open>
        <summary>Свой индекс (формула)</summary>
        <p class="hint">Переменные: <code id="varList"></code>.<br>
          Функции: <code>zscore</code>, <code>minmax</code>, <code>percentile_rank</code>,
          <code>quantile</code>, <code>rank</code>, <code>log</code>, <code>clamp</code>.<br>
          Пример: <code>zscore(life_exp) * minmax(gdp_pc)</code></p>
        <textarea id="formulaInput" rows="2" placeholder="zscore(life_exp) * minmax(gdp_pc)"></textarea>
        <div class="row">
          <button id="applyFormula">Построить</button>
          <button id="clearFormula" class="ghost">Сбросить к индексу</button>
        </div>
        <div id="formulaError" class="error"></div>
      </details>

      <div id="legend"></div>
      <div id="status" class="status"></div>
      <p class="src" id="sourceNote"></p>
    </aside>

    <main id="stage">
      <svg id="map" preserveAspectRatio="xMidYMid meet"></svg>
    </main>
    <div id="tooltip" hidden></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
