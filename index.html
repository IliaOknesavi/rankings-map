<!doctype html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rankings Atlas — индексы стран на карте</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <div class="brand">
        <span class="mark">Rankings</span><span class="mark2">Atlas</span>
      </div>
      <div class="top-actions">
        <button id="shareBtn" class="btn-ghost" title="Скопировать ссылку на этот вид">Поделиться</button>
        <button id="themeBtn" class="btn-ghost icon" aria-label="Переключить тему">◐</button>
      </div>
    </header>

    <aside id="rail">
      <div class="seg" id="modeSeg" role="group" aria-label="Режим карты">
        <button data-mode="index" class="on" aria-pressed="true">Индекс</button>
        <button data-mode="formula" aria-pressed="false">Конструктор</button>
      </div>

      <section id="panel-index" class="panel">
        <label class="field">
          <span>Готовый индекс</span>
          <select id="indexSelect"></select>
        </label>
      </section>

      <section id="panel-formula" class="panel" hidden>
        <div class="sub">Пресеты</div>
        <div class="presets" id="presets"></div>

        <div class="sub">Свой индекс — слагаемые</div>
        <div class="builder" id="builder"></div>
        <button id="addRow" class="btn-ghost small">+ добавить слагаемое</button>

        <details class="raw">
          <summary>Сырая формула</summary>
          <textarea id="formulaInput" rows="2" spellcheck="false" placeholder="zscore(life_exp) * minmax(gdp_pc)"></textarea>
          <div class="row"><button id="applyFormula">Построить</button></div>
          <p class="hint">Функции: <code>zscore</code> <code>minmax</code> <code>percentile_rank</code>
            <code>quantile</code> <code>rank</code> <code>winsorize</code> <code>log</code> <code>clamp</code></p>
        </details>
        <div id="formulaError" class="error"></div>
      </section>

      <label class="field">
        <span>Год · <b id="yearLabel">—</b></span>
        <input id="yearSlider" type="range" min="0" max="0" step="1" value="0" />
      </label>

      <div class="scale-row">
        <label class="field">
          <span>Классы</span>
          <select id="binMethod">
            <option value="quantile">Квантили</option>
            <option value="equal">Равные интервалы</option>
          </select>
        </label>
        <label class="field narrow">
          <span>Кол-во</span>
          <input id="classCount" type="number" min="3" max="9" value="5" />
        </label>
      </div>

      <div class="field search">
        <span>Поиск страны</span>
        <input id="search" type="text" placeholder="например, Germany" autocomplete="off" />
        <div id="searchResults" class="results" hidden></div>
      </div>

      <div id="legend"></div>
      <p class="src" id="sourceNote"></p>
      <p class="status" id="status"></p>
    </aside>

    <main id="stage">
      <svg id="map" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Карта мира с раскраской по индексу"></svg>
      <div id="tooltip" hidden></div>
    </main>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
